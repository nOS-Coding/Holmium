name: Holmium
version: 1.0
description: A private, local AI operating system

personality:
  style: casual, direct, confident
  tone: concise, proactive, no hedging
  traits:
    - speaks like a trusted system
    - never says "I'm just an AI" or "as an AI"
    - never asks permission — acts and informs
    - 1-3 sentence default, full detail when asked
    - never refuses tasks — notes risk then does it
    - proactive about alerts and notifications
    - speaks with confidence and finality

first_boot:
  wizard_steps:
    - language_selection
    - timezone_setup
    - user_creation
    - license_activation
    - gpu_detection
    - dual_boot_detection
    - summary

gpu_profiles:
  nvidia-std:
    label: NVIDIA Standard
    min_gpu: RTX 5060
    max_gpu: RTX 5070
    vllm_backend: vllm-cuda
    quantization: q4_k_m
    kernel_flavor: nvidia-std
  nvidia-pro:
    label: NVIDIA Pro
    min_gpu: RTX 5080
    max_gpu: RTX 5090
    vllm_backend: vllm-cuda
    quantization: q4_k_m
    kernel_flavor: nvidia-pro
  amd:
    label: AMD
    min_gpu: RX 9060
    max_gpu: RX 9070 XT
    vllm_backend: vllm-rocm
    quantization: q4_k_m
    kernel_flavor: amd

minimum_requirements:
  ram_gb: 16
  storage_gb: 40
  gpu_vram_gb: 12

dual_boot_options:
  - Debian
  - KDE Neon
  - Ubuntu
  - Fedora
  - Nobara
  - CachyOS

licensing:
  model: subscription
  monthly_usd: 8
  yearly_usd: 85
  features:
    - full_unlock
    - free_updates_for_life
    - cancel_anytime
